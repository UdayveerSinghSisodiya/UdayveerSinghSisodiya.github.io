<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2a28"/>
      <stop offset="100%" stop-color="#091a14"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="6" fill="none"
        stroke="rgba(26,122,109,0.55)" stroke-width="1"/>
  <!-- UV text -->
  <text x="16" y="21.5" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="13.5" letter-spacing="-0.5"
        fill="#FFB800">UV</text>
</svg>
